{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="section">
  <div class="container mx-auto px-4 lg:px-8">
    <div class="w-full">
      <h1 class="heading_h2 !mb-10">{{ page.title }}</h1>

      <div class="rich-content heading_h5">
        {{ page.body|richtext }}
      </div>
    </div>
  </div>
</section>

<style>
  .rich-content h2 {
    font-size: 2rem;
    line-height: 1.2;
    font-weight: 700;
    margin-top: 2rem;
    margin-bottom: 1rem;
  }

  .rich-content h3 {
    font-size: 1.5rem;
    line-height: 1.25;
    font-weight: 700;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
  }

  .rich-content h4 {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    margin-top: 1.25rem;
    margin-bottom: 0.5rem;
  }

  .rich-content p,
  .rich-content li {
    text-align: justify;
  }
</style>
{% endblock %}
